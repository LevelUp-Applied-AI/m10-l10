# Lab-level Docker Compose — api + web only.
#
# The four-service stack (api + web + neo4j + weaviate) is the Integration
# task's deliverable. The Lab stack assumes Neo4j and Weaviate are
# running externally (the learner started them via the M9/M8 Compose
# stacks, or via `docker compose` in the Integration repo).
#
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - api/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
