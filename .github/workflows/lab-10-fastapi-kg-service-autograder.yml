name: "Lab 10 — FastAPI + Next.js Recipe Service Autograder"
on:
  push:
    branches-ignore: [main, stretch-tue-auth]
  pull_request:
    branches: [main]

jobs:
  backend:
    # Skip on the stretch PR (head = stretch-tue-auth): that branch gates
    # /extract behind auth, which the open Lab tests intentionally do not
    # send — they belong to the Lab branch and run there.
    if: github.head_ref != 'stretch-tue-auth'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testtest
          NEO4J_dbms_memory_heap_max__size: 1G
          NEO4J_dbms_memory_pagecache_size: 512M
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q -O - http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 24
      weaviate:
        image: semitechnologies/weaviate:1.24.10
        env:
          QUERY_DEFAULTS_LIMIT: "20"
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          DEFAULT_VECTORIZER_MODULE: "none"
          PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
        ports:
          - 8080:8080
        options: >-
          --health-cmd "wget -q -O - http://localhost:8080/v1/.well-known/ready || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 24
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testtest
      WEAVIATE_URL: http://localhost:8080
      WEB_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt PyYAML
          # Pin the spaCy model wheel directly — `python -m spacy download`
          # constructs a malformed URL on some spaCy/pip combinations
          # (.../download/-en_core_web_sm/-en_core_web_sm.tar.gz → 404).
          pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl
      - name: Backend autograder
        run: pytest tests/backend tests/frontend/test_compose.py tests/frontend/test_dockerfiles.py tests/frontend/test_typescript_interfaces.py -v --tb=short

  frontend:
    if: github.head_ref != 'stretch-tue-auth'
    # Pinned to 22.04: on 24.04 the locked Playwright's `install --with-deps`
    # apt step fails (renamed system libs). 22.04 matches the locked toolchain.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        run: cd web && npm ci
      - name: Build Next.js
        run: cd web && npm run build
      - name: Install Playwright Chromium
        run: cd web && npx playwright install --with-deps chromium
      # Playwright smoke runs against a mocked backend in CI — the specs
      # use `page.route` to stub the api endpoints, then assert that the
      # typed responses render correctly. Full end-to-end against a live
      # Compose stack runs locally and in the Integration's `stack` job.
      - name: Playwright smoke
        run: cd web && npx playwright test

  docker:
    if: github.head_ref != 'stretch-tue-auth'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Backend Docker build
        # Repo-root context + explicit -f api/Dockerfile. The api/Dockerfile
        # COPYs api/requirements.txt and api/ into /app so the container can
        # run `uvicorn api.main:app` and the starter's package-relative
        # imports resolve. `docker build ./api` would set the build context
        # to api/, where neither path exists, and the build fails.
        run: docker build -t m10-api -f api/Dockerfile .
      - name: Frontend Docker build
        run: docker build -t m10-web ./web
      - name: Image sizes
        run: |
          docker images m10-api --format '{{.Size}}'
          docker images m10-web --format '{{.Size}}'
