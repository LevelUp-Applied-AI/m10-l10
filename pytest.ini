[pytest]
asyncio_mode = auto
testpaths = tests
# tests/auth belongs to the separate Stretch (auth) assignment and is not
# part of the Lab — it requires api/auth.py and a live backend, and asserts
# an auth policy this branch does not implement. Ignore it so a bare
# `pytest` on the Lab branch runs only the Lab suite. The Lab autograder
# names its paths explicitly, so it is unaffected.
addopts = -p no:warnings --ignore=tests/auth
filterwarnings =
    ignore
